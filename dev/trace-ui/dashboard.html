<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paybond dev trace</title>
  <style>
    :root {
      --bg: #0b1020;
      --surface: #141b31;
      --surface-elevated: #1a2340;
      --border: #24304f;
      --text: #e8edf8;
      --muted: #9aa8c7;
      --accent: #6b7cff;
      --phase-agent: #6b7cff;
      --phase-tool: #4ecdc4;
      --phase-authorize: #ffd166;
      --phase-evidence: #9b5de5;
      --phase-result: #06d6a0;
      --warn-bg: #2a1f12;
      --warn-border: #7a4a12;
      --warn-text: #ffd9a8;
      --info-bg: #142033;
      --info-border: #2c4f7a;
      --info-text: #b8d7ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    code {
      color: #9fd0ff;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.9em;
    }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .header h1 {
      margin: 0 0 0.35rem;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .status-pill .dot {
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 50%;
      background: var(--phase-result);
      box-shadow: 0 0 0 3px rgba(6, 214, 160, 0.2);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    .banner {
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .banner-warn {
      background: var(--warn-bg);
      border: 1px solid var(--warn-border);
      color: var(--warn-text);
    }

    .banner-info {
      background: var(--info-bg);
      border: 1px solid var(--info-border);
      color: var(--info-text);
    }

    .dashboard {
      display: grid;
      grid-template-columns: minmax(220px, 260px) minmax(0, 1fr);
      gap: 1rem;
      align-items: start;
    }

    @media (max-width: 820px) {
      .dashboard { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .panel-header {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .run-list {
      list-style: none;
      margin: 0;
      padding: 0.5rem;
      max-height: 70vh;
      overflow: auto;
    }

    .run-item {
      display: block;
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      background: transparent;
      color: inherit;
      border-radius: 10px;
      padding: 0.75rem 0.85rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .run-item:hover {
      border-color: var(--border);
      background: var(--surface-elevated);
    }

    .run-item.active {
      border-color: rgba(107, 124, 255, 0.55);
      background: rgba(107, 124, 255, 0.12);
    }

    .run-item-title {
      display: block;
      font-weight: 600;
      font-size: 0.92rem;
      margin-bottom: 0.2rem;
    }

    .run-item-meta {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .trace-panel {
      padding: 1rem 1.1rem 1.25rem;
    }

    .run-heading h2 {
      margin: 0 0 0.35rem;
      font-size: 1.15rem;
    }

    .run-meta {
      margin: 0 0 1rem;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .run-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-bottom: 1rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--muted);
    }

    .badge.ok { border-color: rgba(6, 214, 160, 0.45); color: #9ef5d8; }
    .badge.warn { border-color: rgba(255, 209, 102, 0.45); color: #ffe3a1; }

    .empty-state {
      color: var(--muted);
      line-height: 1.6;
      padding: 1rem 0.25rem;
    }

    .v-timeline {
      position: relative;
      margin: 0;
      padding: 0.25rem 0 0 0.25rem;
      list-style: none;
    }

    .v-timeline::before {
      content: "";
      position: absolute;
      left: 0.72rem;
      top: 0.75rem;
      bottom: 0.75rem;
      width: 2px;
      background: linear-gradient(
        180deg,
        var(--phase-agent) 0%,
        var(--phase-tool) 22%,
        var(--phase-authorize) 44%,
        var(--phase-evidence) 66%,
        var(--phase-result) 100%
      );
      opacity: 0.55;
    }

    .v-timeline-step {
      position: relative;
      display: grid;
      grid-template-columns: 1.5rem minmax(0, 1fr);
      gap: 0.85rem;
      padding: 0 0 1.35rem 0;
    }

    .v-timeline-step:last-child { padding-bottom: 0.25rem; }

    .v-timeline-rail {
      position: relative;
      display: flex;
      justify-content: center;
      padding-top: 0.2rem;
    }

    .v-timeline-dot {
      width: 0.95rem;
      height: 0.95rem;
      border-radius: 50%;
      border: 2px solid var(--phase-color, var(--border));
      background: var(--bg);
      box-shadow: 0 0 0 4px rgba(11, 16, 32, 0.9);
      z-index: 1;
    }

    .v-timeline-body {
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.8rem 0.9rem;
    }

    .v-timeline-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.35rem;
    }

    .phase-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.12rem 0.5rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #0b1020;
      background: var(--phase-color, var(--muted));
    }

    .step-time {
      margin-left: auto;
      color: var(--muted);
      font-size: 0.76rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .step-label {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .step-detail {
      margin-top: 0.55rem;
    }

    .step-detail summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .step-detail pre {
      margin: 0.5rem 0 0;
      overflow: auto;
      background: #0f1528;
      border-radius: 8px;
      padding: 0.65rem;
      font-size: 0.75rem;
      color: #c6d4ef;
    }

    .raw-json {
      margin-top: 1rem;
    }

    .raw-json summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 0.5rem;
    }

    .raw-json pre {
      overflow: auto;
      background: #0f1528;
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.75rem;
      color: #c6d4ef;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <div>
        <h1>Paybond dev trace</h1>
        <p class="subtitle">Model → tool → authorize → evidence → settlement. Local dashboard for <code>paybond dev smoke</code> and middleware runs.</p>
      </div>
      <div class="status-pill" id="status-pill" aria-live="polite">
        <span class="dot" aria-hidden="true"></span>
        <span id="status-text">Connecting…</span>
      </div>
    </header>

    <div id="banner-root"></div>

    <div class="dashboard">
      <aside class="panel" aria-label="Recent runs">
        <div class="panel-header">Recent runs</div>
        <ul class="run-list" id="run-list"></ul>
      </aside>

      <section class="panel trace-panel" aria-label="Run timeline">
        <div id="trace-root">
          <p class="empty-state">Loading trace events…</p>
        </div>
      </section>
    </div>
  </div>

  <script>
    const PHASE_LABELS = {
      agent: "Tool call",
      tool: "Tool",
      authorize: "Authorize",
      evidence: "Evidence",
      result: "Result",
    };

    const PHASE_COLORS = {
      agent: "var(--phase-agent)",
      tool: "var(--phase-tool)",
      authorize: "var(--phase-authorize)",
      evidence: "var(--phase-evidence)",
      result: "var(--phase-result)",
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function formatTime(iso) {
      if (!iso) return "";
      const date = new Date(iso);
      if (Number.isNaN(date.getTime())) return iso;
      return date.toLocaleTimeString(undefined, {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
      });
    }

    function focusRunIdFromPath() {
      const match = window.location.pathname.match(/^\/runs\/([^/]+)$/);
      return match ? decodeURIComponent(match[1]) : null;
    }

    function defaultStepsForEvent(event) {
      const recordedAt = event.recorded_at || "";
      const spendCents = Number(event.requested_spend_cents || 0);
      return [
        { phase: "tool", label: `Tool call: ${event.operation || event.id}`, recorded_at: recordedAt },
        {
          phase: "authorize",
          label: event.authorized
            ? `Paybond approved $${(spendCents / 100).toFixed(2)}`
            : "Spend authorization pending",
          recorded_at: recordedAt,
        },
        { phase: "result", label: "Tool executed", recorded_at: recordedAt },
        {
          phase: "evidence",
          label: event.evidence_submitted ? "Evidence submitted" : "Evidence pending",
          recorded_at: recordedAt,
        },
        {
          phase: "result",
          label: event.sandbox_lifecycle_status
            ? `Settlement: ${event.sandbox_lifecycle_status}`
            : "Settlement simulated",
          recorded_at: recordedAt,
        },
      ];
    }

    function resolveSteps(event) {
      if (Array.isArray(event.steps) && event.steps.length > 0) {
        return event.steps;
      }
      return defaultStepsForEvent(event);
    }

    function renderBanner(hasCredentials, hasEvents) {
      if (hasCredentials) return "";
      if (hasEvents) {
        return `<aside class="banner banner-info">
  <strong>Sandbox credentials not detected.</strong>
  Recent trace events were recorded locally. Run <code>paybond login</code> to bind against the real sandbox API on the next smoke.
</aside>`;
      }
      return `<aside class="banner banner-warn">
  <strong>Configure sandbox login.</strong>
  Run <code>paybond dev smoke --offline</code> for a no-credentials local loop, or <code>paybond login</code> then <code>paybond dev smoke</code> for sandbox API events.
</aside>`;
    }

    function renderTimelineSteps(steps) {
      return steps
        .map((step) => {
          const phase = step.phase || "result";
          const phaseColor = PHASE_COLORS[phase] || "var(--muted)";
          const detail = step.detail && Object.keys(step.detail).length > 0
            ? `<details class="step-detail">
  <summary>Details</summary>
  <pre>${escapeHtml(JSON.stringify(step.detail, null, 2))}</pre>
</details>`
            : "";
          return `<li class="v-timeline-step" style="--phase-color: ${phaseColor}">
  <div class="v-timeline-rail" aria-hidden="true">
    <span class="v-timeline-dot"></span>
  </div>
  <div class="v-timeline-body">
    <div class="v-timeline-top">
      <span class="phase-badge" style="background: ${phaseColor}">${escapeHtml(PHASE_LABELS[phase] || phase)}</span>
      <span class="step-time">${escapeHtml(formatTime(step.recorded_at))}</span>
    </div>
    <p class="step-label">${escapeHtml(step.label || "")}</p>
    ${detail}
  </div>
</li>`;
        })
        .join("");
    }

    function renderRunDetail(event) {
      const steps = resolveSteps(event);
      const spend = Number(event.requested_spend_cents || 0);
      const authorizedBadge = event.authorized
        ? `<span class="badge ok">Authorized $${(spend / 100).toFixed(2)}</span>`
        : `<span class="badge warn">Authorization pending</span>`;
      const evidenceBadge = event.evidence_submitted
        ? `<span class="badge ok">Evidence submitted</span>`
        : `<span class="badge warn">Evidence pending</span>`;
      const settlement = event.sandbox_lifecycle_status
        ? `<span class="badge ok">Settlement: ${escapeHtml(event.sandbox_lifecycle_status)}</span>`
        : "";

      return `<div class="run-heading">
  <h2>${escapeHtml(event.operation || event.id)}</h2>
  <p class="run-meta">preset ${escapeHtml(event.preset || "")}${event.intent_id ? ` · intent ${escapeHtml(event.intent_id)}` : ""} · run ${escapeHtml(event.run_id || event.id)}</p>
  <div class="run-badges">${authorizedBadge}${evidenceBadge}${settlement}</div>
</div>
<ol class="v-timeline" aria-label="Middleware trace timeline">
  ${renderTimelineSteps(steps)}
</ol>
<details class="raw-json">
  <summary>Raw trace JSON</summary>
  <pre>${escapeHtml(JSON.stringify(event, null, 2))}</pre>
</details>`;
    }

    function renderRunList(events, focusRunId) {
      if (events.length === 0) {
        return `<li class="empty-state">No runs yet. Run <code>paybond dev smoke</code> or <code>paybond dev loop</code>.</li>`;
      }
      const sorted = [...events].reverse();
      return sorted
        .map((event) => {
          const runId = event.run_id || event.id;
          const active = focusRunId && (runId === focusRunId || event.id === focusRunId);
          return `<li>
  <button type="button" class="run-item${active ? " active" : ""}" data-run-id="${escapeHtml(runId)}">
    <span class="run-item-title">${escapeHtml(event.operation || runId)}</span>
    <span class="run-item-meta">${escapeHtml(formatTime(event.recorded_at))} · ${escapeHtml(event.preset || "preset")}</span>
  </button>
</li>`;
        })
        .join("");
    }

    function selectEvent(events, focusRunId) {
      if (!events.length) return null;
      if (!focusRunId) return events[events.length - 1];
      return (
        events.find((event) => event.id === focusRunId || event.run_id === focusRunId) ||
        events[events.length - 1]
      );
    }

    function renderDashboard(payload) {
      const events = Array.isArray(payload.events) ? payload.events : [];
      const hasCredentials = Boolean(payload.has_credentials);
      const focusRunId = focusRunIdFromPath();
      const selected = selectEvent(events, focusRunId);

      document.getElementById("banner-root").innerHTML = renderBanner(hasCredentials, events.length > 0);
      document.getElementById("status-text").textContent = `${events.length} run${events.length === 1 ? "" : "s"} · live`;
      document.getElementById("run-list").innerHTML = renderRunList(events, focusRunId);

      const traceRoot = document.getElementById("trace-root");
      if (!selected) {
        traceRoot.innerHTML = `<p class="empty-state">No trace events yet. Run <code>paybond dev smoke</code> or <code>paybond dev loop</code>, then refresh this page.</p>`;
        return;
      }
      traceRoot.innerHTML = renderRunDetail(selected);
    }

    async function refreshDashboard() {
      const response = await fetch("/api/events", { cache: "no-store" });
      if (!response.ok) {
        document.getElementById("status-text").textContent = "API error";
        return;
      }
      const payload = await response.json();
      renderDashboard(payload);
    }

    document.getElementById("run-list").addEventListener("click", (event) => {
      const button = event.target.closest("[data-run-id]");
      if (!button) return;
      const runId = button.getAttribute("data-run-id");
      if (!runId) return;
      const nextPath = `/runs/${encodeURIComponent(runId)}`;
      if (window.location.pathname !== nextPath) {
        window.history.pushState({}, "", nextPath);
      }
      refreshDashboard();
    });

    window.addEventListener("popstate", () => {
      refreshDashboard();
    });

    refreshDashboard();
    setInterval(refreshDashboard, 2000);
  </script>
</body>
</html>
