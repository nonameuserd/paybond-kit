# Reference policy for CLI smoke (`npm run smoke`) — aligned with the CrewAI procurement starter.
# Runtime spend for app.py / agent.py is resolved in paybond_wiring.py from the
# catalog (SKU × quantity) — not from an agent-supplied amount_cents field.

version: 1
name: procurement-agent-v1
default_deny: true

tools:
  procurement.submit_po:
    side_effecting: true
    max_spend_cents: 25000
    evidence_preset: cost_and_completion

  procurement.list_vendors:
    side_effecting: false

  procurement.get_quote:
    side_effecting: false

  procurement.search_catalog:
    side_effecting: false

intent:
  allowed_tools:
    - procurement.submit_po
  budget:
    currency: usd
    max_spend_usd: 250
